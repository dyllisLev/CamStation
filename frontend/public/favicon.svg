<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Mount arm -->
  <rect x="27" y="10" width="10" height="14" rx="3" fill="#1e3a5f"/>
  <!-- Camera body -->
  <rect x="8" y="22" width="38" height="22" rx="5" fill="#1e3a8a"/>
  <!-- Lens housing -->
  <circle cx="46" cy="33" r="11" fill="#1e3a5f"/>
  <!-- Lens ring -->
  <circle cx="46" cy="33" r="8" fill="#1d4ed8"/>
  <!-- Lens glass -->
  <circle cx="46" cy="33" r="5" fill="#0f172a"/>
  <!-- Lens highlight -->
  <circle cx="43.5" cy="30.5" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <!-- REC dot -->
  <circle cx="16" cy="33" r="3.5" fill="#ef4444"/>
  <circle cx="16" cy="33" r="1.5" fill="#fca5a5"/>
  <!-- Ventilation lines -->
  <line x1="22" y1="26" x2="22" y2="40" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="26" y1="26" x2="26" y2="40" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
