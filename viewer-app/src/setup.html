<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CamViewer 설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a; color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; user-select: none;
    }
    .card {
      background: #242424; border: 1px solid #333;
      border-radius: 8px; padding: 32px; width: 360px;
    }
    h2 { font-size: 18px; color: #64b5f6; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #555; margin-bottom: 24px; }
    label.field-label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; }
    input[type=text] {
      width: 100%; background: #2a2a2a; border: 1px solid #444;
      color: #eee; border-radius: 4px; padding: 8px 10px;
      font-size: 13px; font-family: monospace;
    }
    input[type=text]:focus { outline: none; border-color: #64b5f6; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    button {
      flex: 1; padding: 8px 0; border: none;
      border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    #testBtn { background: #2a2a2a; border: 1px solid #555; color: #eee; }
    #testBtn:disabled { opacity: 0.5; cursor: default; }
    #startBtn { background: #1565c0; color: #fff; }
    #startBtn:disabled { background: #333; color: #555; cursor: default; }
    #status { font-size: 12px; margin-top: 10px; min-height: 18px; }
    .ok  { color: #81c784; }
    .err { color: #ef5350; }
    .check-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px; font-size: 12px; color: #aaa; cursor: pointer;
    }
    .version { font-size: 10px; color: #444; text-align: right; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>CamViewer</h2>
    <div class="subtitle">CamStation 라이브 뷰어</div>

    <label class="field-label" for="urlInput">서버 주소</label>
    <input type="text" id="urlInput" placeholder="http://192.168.1.100"
           autocomplete="off" spellcheck="false" />

    <div class="row">
      <button id="testBtn">연결 테스트</button>
      <button id="startBtn" disabled>시작</button>
    </div>
    <div id="status"></div>

    <label class="check-row">
      <input type="checkbox" id="fullscreen">
      시작 시 전체화면
    </label>

    <div class="version" id="version"></div>
  </div>
  <script src="setup.js"></script>
</body>
</html>
